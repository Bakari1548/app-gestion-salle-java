# Fichier de configuration UNIV-SCHEDULER
# Ce fichier contient les paramètres de configuration de l'application

# Base de données
db.url=jdbc:sqlite:univscheduler.db
db.driver=org.sqlite.JDBC

# Application
app.name=UNIV-SCHEDULER
app.version=1.0
app.title=Gestion des Salles Universitaires

# Interface
theme.default=light
language.default=fr

# Rapports
reports.default.path=./rapports
reports.default.format=CSV

# Logs
log.level=INFO
log.file=application.log

# Performance
cache.enabled=true
cache.size=100

# Sécurité
session.timeout=3600
password.min.length=8
